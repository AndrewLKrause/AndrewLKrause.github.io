project:
  type: website
  output-dir: docs

title: "My Reveal.js Presentation"
format:
  revealjs:
    theme: "black"
    slideLevel: 2
    transition: "slide"
    incremental: true
    controls: true
    progress: true
    history: true
    center: true
    width: "100%"
    height: "100%"
    margin: 0.1
    minScale: 0.5
    maxScale: 1.5
    autoSlide: 5000
    autoSlideStoppable: true
    keyboard: true
    touch: true
    loop: false
    fragments: true
    slideNumber: true
    overview: true
    hash: false
    pdf: false
    pdfOptions:
      landscape: true
      printBackground: true
    revealOptions:
      controls: true
      progress: true
      slideNumber: true
      history: true
      keyboard: true
      touch: true
      loop: false
      fragments: true
      overview: true
      hash: false
      pdf: false
      pdfOptions:
        landscape: true
        printBackground: true
    css: ["styles.css"]
    js: ["scripts.js"]